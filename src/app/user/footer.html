<footer class="bg-[#151414] text-gray-400">

  <!-- TOP CONTACT STRIP -->
  <div class="border-b border-[#373636]">
    <div class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 sm:grid-cols-2 gap-6 text-center md:text-left">

      <!-- Email -->
      <div class="flex items-center justify-center md:justify-start gap-3">
        <i class="fa-solid fa-envelope text-[#DDB15A] text-lg"></i>
        <div>
          <p class="text-white text-sm font-semibold">Email</p>
          <a href="mailto:info@iwebmatix.com" class="text-sm hover:text-[#DDB15A]">
            info@iwebmatix.com
          </a>
        </div>
      </div>

      <!-- Billing -->
      <div class="flex items-center justify-center md:justify-start gap-3">
        <i class="fa-solid fa-envelope text-[#DDB15A] text-lg"></i>
        <div>
          <p class="text-white text-sm font-semibold">Billing</p>
          <a href="mailto:billing@iwebmatix.com" class="text-sm hover:text-[#DDB15A]">
            billing@iwebmatix.com
          </a>
        </div>
      </div>

    </div>
  </div>


  <!-- MAIN FOOTER -->
  <div class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-10">

    <!-- LOGO + ABOUT -->
    <div>
      <h2 class="text-2xl font-bold text-white mb-3">iWebmatix</h2>
      <p class="text-sm leading-6">
        Turning ideas into impact with powerful digital marketing solutions.
      </p>
    </div>


    <!-- QUICK LINKS -->
    <div>
      <h3 class="text-white text-lg font-semibold mb-4 border-b border-[#373636] pb-2">
        Quick Links
      </h3>

      <ul class="space-y-2 text-sm">
        <li><a routerLink="" class="hover:text-[#DDB15A]">Home</a></li>
        <li><a routerLink="/about" class="hover:text-[#DDB15A]">About</a></li>
        <li><a routerLink="/service" class="hover:text-[#DDB15A]">Services</a></li>
        <li><a routerLink="/contact" class="hover:text-[#DDB15A]">Contact</a></li>
      </ul>
    </div>


    <!-- SUBSCRIBE -->
    <div>
      <h3 class="text-white text-lg font-semibold mb-4 border-b border-[#373636] pb-2">
        Subscribe
      </h3>

      <form (submit)="onSubmit($event)" class="flex">

        <input type="email" [(ngModel)]="email" name="email"
          placeholder="Enter your email"
          class="flex-1 px-4 py-2 bg-[#2E2E2E] border border-[#2E2E2E] text-sm outline-none">

        <button type="submit"
          class="px-4 bg-[#DDB15A] text-black hover:bg-[#cf8e0e] transition">
          <i class="fa-solid fa-paper-plane"></i>
        </button>

      </form>

      @if (message) {
        <p class="mt-2 text-xs text-white">{{ message }}</p>
      }

    </div>

  </div>


  <!-- COPYRIGHT -->
  <div class="bg-[#202020] py-4 text-center text-sm">
    <p>
      © 2026 iWebmatix. All Rights Reserved.
      <span class="text-[#DDB15A]">iWebmatix</span>
    </p>
  </div>

</footer>
