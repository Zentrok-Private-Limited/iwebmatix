<!-- 🖤 Top Contact Bar -->
<div class="bg-black text-white text-sm py-2 px-4 flex justify-between items-center">
  <div class="hidden md:flex items-center space-x-4 text-xs">
    <a href="tel:+0000000000">
      <span class="text-xl">(+0)-000-0000-000</span>
    </a>

    <a href="mailto:support@websitename.com">
      <span class="text-xl">support@websitename.com</span>
    </a>

  </div>

  <div class="overflow-hidden whitespace-nowrap text-sm font-semibold">
    <div class="animate-marquee inline-block">
      Welcome to <span class="text-[#800000] font-bold">Digital Marketing!</span> Best deals and offers available now.
    </div>
  </div>

  <div class="hidden md:flex space-x-3 text-lg">
    <a href="https://wa.me/919876543210?text=Hello%20I%20want%20to%20know%20more" target="_blank">
      <i class="fab fa-whatsapp p-2 text-xl hover:text-green-600"></i>
    </a>


    <a href="https://facebook.com/yourpage" target="_blank">
      <i class="fab fa-facebook-f p-2 hover:text-blue-900"></i>
    </a>

    <a href="https://instagram.com/yourprofile" target="_blank">
      <i class="fab fa-instagram p-2 hover:text-pink-500"></i>
    </a>

    <a href="https://twitter.com/yourprofile" target="_blank">
      <i class="fab fa-x-twitter p-2 hover:text-gray-200"></i>
    </a>

    <a href="https://linkedin.com/in/yourprofile" target="_blank">
      <i class="fab fa-linkedin p-2 hover:text-blue-500"></i>
    </a>
  </div>
</div>

<nav class="sticky top-0 w-full z-40">
  <div class="bg-[#470000] shadow-md">
    <div class="flex items-center justify-between px-4">
      <!-- Logo -->
      <a routerLink="" class="flex items-center">
        <img src="logo1.png" class="h-[80px]" alt="">
      </a>

      <!-- Hamburger Button (mobile) -->
      <button (click)="toggleMenu()" class="md:hidden p-2 text-gray-100 hover:text-[#800000]">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Desktop Menu -->
      <div class="hidden md:flex space-x-8 font-bold text-[#800000] text-base items-center">
        <a routerLink="/" class="text-white hover:text-red-700">Home</a>
        <a routerLink="/about" class="text-white hover:text-red-700">About</a>
        <a routerLink="/portfolio" class="text-white hover:text-red-700">Portfolio</a>
        <a routerLink="/service" class="text-white hover:text-red-700">Services</a>
        <a routerLink="/contact" class="text-white hover:text-red-700">Contact</a>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div [ngClass]="menuOpen ? 'block' : 'hidden'"
      class="md:hidden bg-white border-t border-gray-200 font-bold text-[#800000] text-center text-lg">
      <a routerLink="/" class="block py-2 hover:text-red-700">Home</a>
      <a routerLink="/about" class="block py-2 hover:text-red-700">About</a>
      <a routerLink="/portfolio" class="hover:text-red-700">Portfolio</a>
      <a routerLink="/service" class="block py-2 hover:text-red-700">Service</a>
      <a routerLink="/contact" class="block py-2 hover:text-red-700">Contact</a>
    </div>
  </div>
</nav>

<a routerLink="/contact" class="fixed top-[250px] right-0 z-[1000000] bg-[#470000] 
         h-[120px] w-[30px] flex items-center justify-center 
         rounded-l-md shadow-lg hover:bg-[maroon] transition-all duration-300 cursor-pointer">
  <span class="text-white text-sm font-semibold [writing-mode:vertical-rl] rotate-180 tracking-widest">
    Contact Us
  </span>
</a>
